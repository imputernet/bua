name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write       # create GitHub releases + upload assets
  packages: write       # push to GHCR
  id-token: write       # OIDC for npm provenance

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build release binaries for all target platforms
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal (x86_64 + arm64)
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: bua
            asset_name: bua-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: bua
            asset_name: bua-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

          # Linux x86_64 (musl = static binary, no glibc dep)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: bua
            asset_name: bua-${{ github.ref_name }}-x86_64-linux-musl.tar.gz

          # Linux arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: bua
            asset_name: bua-${{ github.ref_name }}-aarch64-linux-musl.tar.gz

          # Linux GNU (with JSC)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: bua
            asset_name: bua-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: bua.exe
            asset_name: bua-${{ github.ref_name }}-x86_64-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release

      # macOS: JSC ships with the Xcode SDK — verify available
      - name: Verify JSC (macOS)
        if: runner.os == 'macOS'
        run: xcrun --show-sdk-path

      # Linux: install dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools libjavascriptcoregtk-4.1-dev
          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package bua
        env:
          # On Linux musl, JSC is not available — build stub mode
          BUA_SKIP_JSC: ${{ contains(matrix.target, 'musl') && '1' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          RELEASE_DIR=target/${{ matrix.target }}/release
          cp README.md LICENSE $RELEASE_DIR/
          tar -czf ${{ matrix.asset_name }} \
            -C $RELEASE_DIR ${{ matrix.binary }} README.md LICENSE

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "target\${{ matrix.target }}\release"
          Copy-Item README.md, LICENSE -Destination $releaseDir
          Push-Location $releaseDir
          Compress-Archive -Path "${{ matrix.binary }}", "README.md", "LICENSE" `
            -DestinationPath "..\..\..\${{ matrix.asset_name }}"
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. Build and push Docker image to GHCR
  # ---------------------------------------------------------------------------
  build-container:
    name: Build & push container (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUA_VERSION=${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # 3. Publish to npm as @imputernet/bua
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm (@imputernet/bua)
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Download all platform binaries built above
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: npm/binaries/
          merge-multiple: true

      - name: Build npm package
        run: node npm/scripts/build.js ${{ github.ref_name }}

      - name: Publish @imputernet/bua to npm
        run: npm publish npm/pkg/ --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Create GitHub Release with all binaries
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for changelog generation

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-assets/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          # Extract section between this tag and the previous one
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "See ROADMAP.md for details.")
          DELIMITER="EOF_${{ github.run_id }}"
          echo "notes<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Bua ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Bua ${{ github.ref_name }}

            An AI-native deterministic JavaScript runtime for autonomous agents.

            ${{ steps.changelog.outputs.notes }}

            ### Installation

            **npm (@imputernet/bua)**
            ```bash
            npm install -g @imputernet/bua
            bua --version
            ```

            **Docker (GHCR)**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker run --rm ghcr.io/${{ github.repository }}:${{ github.ref_name }} bua --version
            ```

            **Cargo**
            ```bash
            cargo install bua --version ${{ github.ref_name }}
            ```

            ### Binaries

            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | macOS | x86_64 | `bua-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon | `bua-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | Linux | x86_64 (musl) | `bua-${{ github.ref_name }}-x86_64-linux-musl.tar.gz` |
            | Linux | arm64 (musl) | `bua-${{ github.ref_name }}-aarch64-linux-musl.tar.gz` |
            | Windows | x86_64 | `bua-${{ github.ref_name }}-x86_64-windows-msvc.zip` |

            Verify with SHA256SUMS.txt included in the release assets.

            ### Container

            ```bash
            # Run a script
            docker run --rm \
              -v ./workspace:/workspace \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
              bua run /workspace/agent.ts --allow-fs=/workspace

            # Shell into the runtime
            docker run --rm -it ghcr.io/${{ github.repository }}:${{ github.ref_name }} sh
            ```

          files: |
            release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
